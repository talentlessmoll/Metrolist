name: Build Hexaro Music

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build_debug:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Install Go and Protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler golang-go
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Generate Protobuf Files
        run: |
          cd app
          if [ -f "generate_proto.sh" ]; then
            chmod +x generate_proto.sh
            ./generate_proto.sh
          else
            echo "generate_proto.sh not found, skipping manual generation"
          fi
        shell: bash

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug GMS APK
        run: ./gradlew assembleGmsDebug --stacktrace
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Hexaro-Music-Debug
          path: app/build/outputs/apk/gms/debug/*.apk
